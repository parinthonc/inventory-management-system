; ============================================================================
; config.default.ini – Shared configuration template (tracked by git)
; ============================================================================
;
; HOW IT WORKS:
;   1. This file is loaded FIRST and contains all settings with defaults.
;   2. config.ini (if it exists) is loaded next and overrides values here.
;   3. config.local.ini (if it exists) is loaded LAST and wins over everything.
;
; MACHINE-SPECIFIC PATHS:
;   Do NOT edit this file for paths that differ per computer.
;   Instead, create a "config.local.ini" in the same folder with ONLY the
;   settings you need to override.
;
;   config.local.ini is git-ignored, so it won't be overwritten by pulls.
; ============================================================================

[images]
; Custom (employee-uploaded) image directory (relative to project folder)
; This is the ONLY image source — all product photos are uploaded by users.
custom_dir = product_images


[paths]
; Archived Ledger Directory (relative to project folder)
archived_ledger_dir = ledger

; Database file (relative to project folder)
db_file = inventory.db

; Logo image (relative to project folder)
logo_file = logo\logo.png

[backup]
; Directory for backup files (relative to project folder)
backup_dir = backups
; Maximum number of backups to retain (oldest deleted first)
max_backups = 30
; Enable automatic daily backup (yes/no)
auto_backup = yes

[permissions]
; Who can upload custom photos (comma-separated roles: admin, viewer)
custom_image_upload = admin,viewer
; Who can delete custom photos
custom_image_delete = admin,viewer
