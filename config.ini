[images]
; Primary image directory – searched first for part number folders
primary_dir = D:\CW\playwright\part_images

; If enabled, folder names in the primary directory are matched by their
; first space-separated token only. Set to "yes" or "no".
primary_match_first_token = yes

; Secondary (fallback) image directory – searched if part not found in primary
secondary_dir = C:\Users\Jan\Documents\CW\results_images\image

; If enabled, folder names in the secondary directory are matched by their
; first space-separated token only (e.g. "04111-20220-71 (Name) (Dims)" → "04111-20220-71").
; Set to "yes" or "no".
secondary_match_first_token = no



[paths]
; Archived Ledger Directory (relative to project folder)
archived_ledger_dir = ledger

; Database file (relative to project folder)
db_file = inventory.db

; Logo image (relative to project folder)
logo_file = logo\logo.png

[backup]
; Directory for backup files (relative to project folder)
backup_dir = backups
; Maximum number of backups to retain (oldest deleted first)
max_backups = 30
; Enable automatic daily backup (yes/no)
auto_backup = yes
